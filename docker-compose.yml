services:
  php:
    build:
      context: docker/php
    volumes:
      - ./app:/var/www/html
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?serverVersion=8.0&charset=utf8mb4
      REDIS_URL: redis://redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    healthcheck:
      # HMAI-37: end-to-end probe — nginx → php-fpm → /api/health checks MySQL,
      # Redis, RabbitMQ. wget is preinstalled in nginx:alpine; --spider exits 0
      # on 2xx and non-zero on 5xx, matching docker's expected semantics.
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  messenger_worker:
    build:
      context: docker/php
    volumes:
      - ./app:/var/www/html
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?serverVersion=8.0&charset=utf8mb4
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
    command: php bin/console messenger:consume async --time-limit=3600 -vv
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  node:
    # HMAI-41: Webpack Encore build container. Stays on a sleep loop so
    # `make assets` / `make assets-watch` can shell into a long-lived
    # node:24-alpine without rebuilding the image each run. Mounts the same
    # ./app tree as php so public/build/ written here is served by nginx.
    image: node:24-alpine
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    command: ["sh", "-c", "tail -f /dev/null"]
    restart: unless-stopped

  scheduler_worker:
    # HMAI-35: Runs Symfony Scheduler recurring messages — midnight cache reset,
    # weekly activity report, 6h Discogs cache warmup. Same image as the
    # messenger worker; consumes the dedicated `scheduler_default` transport.
    build:
      context: docker/php
    volumes:
      - ./app:/var/www/html
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?serverVersion=8.0&charset=utf8mb4
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
    command: php bin/console messenger:consume scheduler_default --time-limit=3600 -vv
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mongodb:
    image: mongo:6
    profiles: [monitoring]
    volumes:
      - mongodb_data:/data/db

  opensearch:
    image: opensearchproject/opensearch:2
    profiles: [monitoring]
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  graylog:
    image: graylog/graylog:5.2
    profiles: [monitoring]
    environment:
      GRAYLOG_PASSWORD_SECRET: somepasswordpepper
      GRAYLOG_ROOT_PASSWORD_SHA2: 8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      GRAYLOG_HTTP_EXTERNAL_URI: http://localhost:9000/
      GRAYLOG_MONGODB_URI: mongodb://mongodb:27017/graylog
      GRAYLOG_ELASTICSEARCH_HOSTS: http://opensearch:9200
    ports:
      - "9000:9000"
      - "12201:12201/udp"
    depends_on:
      - mongodb
      - opensearch

volumes:
  mysql_data:
  mongodb_data:
  opensearch_data: