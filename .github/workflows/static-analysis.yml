name: Static Analysis

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  analyse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql, redis, amqp, bcmath
          coverage: none
          tools: composer:v2

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('app/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Make console executable
        run: chmod +x bin/console

      - name: Warm cache for PHPStan-Symfony
        env:
          APP_ENV: dev
          APP_DEBUG: '1'
          DATABASE_URL: 'mysql://app:app@127.0.0.1:3306/app?serverVersion=8.0'
          MESSENGER_TRANSPORT_DSN: 'in-memory://'
          REDIS_URL: 'redis://127.0.0.1:6379'
          API_KEY: 'ci-api-key'
        run: bin/console cache:warmup --env=dev

      - name: PHP Rector
        run: vendor/bin/rector process --dry-run

      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: PHPUnit
        run: php vendor/bin/phpunit
