name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

# HMAI-151: rapid fixup pushes used to spawn parallel runs that were thrown
# away anyway. github.ref groups PR head refs and branch pushes; the older
# run is cancelled the moment a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # HMAI-356: the five independent static-analysis tools run as parallel matrix
  # legs (one gate per leg) instead of sequential steps, so a failure in one no
  # longer hides the others — fail-fast: false keeps every leg running and each
  # still blocks the merge (no false "success"). The workflow-level `concurrency`
  # block (top of file, HMAI-151) already cancels superseded same-ref runs, so
  # that half of the ticket was in place. Only PHPStan needs the warmed Symfony
  # container, so the other legs skip the warmup and reach their check sooner.
  static-analysis:
    name: Static analysis (${{ matrix.tool }})
    runs-on: ubuntu-latest
    # HMAI-154 / HMAI-358: re-based to the parallel-matrix profile (HMAI-356) —
    # each leg is its own runner; the slowest (Rector) is ~51 s, plus a cold-cache
    # composer buffer. Generous headroom; a runaway is still killed long before the
    # 360-min default would burn the free-tier budget.
    timeout-minutes: 6
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: Rector
            run: vendor/bin/rector process --dry-run
          - tool: CS Fixer
            run: vendor/bin/php-cs-fixer fix --dry-run --diff
          # phpstan-symfony resolves service IDs from a warmed container.
          - tool: PHPStan
            run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress
            warmup: true
          # HMAI-146: enforces hexagonal layer boundaries + cross-module isolation.
          - tool: Deptrac
            run: vendor/bin/deptrac analyse --no-progress
          # HMAI-149: CVEs in locked deps block the merge (bump, do not suppress);
          # --abandoned=report keeps abandonment a warning, not a hard fail.
          - tool: Composer audit
            run: composer audit --abandoned=report
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, redis, amqp, bcmath, sodium
          coverage: none
          tools: composer:v2

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      # HMAI-353: also cache app/vendor (not just the download dir) so an
      # unchanged composer.lock skips the extract step of composer install.
      # PHP-versioned, vendor-scoped key: the autoloader is platform-checked and
      # must not collide with the download-only key the other jobs still use.
      # composer install stays — on a hit it is a fast verify + a rerun of the
      # post-install scripts (autoloader dump, assets:install).
      - uses: actions/cache@v6
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            app/vendor
          key: ${{ runner.os }}-php8.5-composer-vendor-${{ hashFiles('app/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.5-composer-vendor-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Make console executable
        run: chmod +x bin/console

      # phpstan-symfony needs a warmed container to resolve service IDs — only the
      # PHPStan leg. Use env=dev; DB/Redis are not actually contacted during warmup.
      - name: Warm cache for PHPStan-Symfony
        if: ${{ matrix.warmup }}
        env:
          APP_ENV: dev
          APP_DEBUG: '1'
          DATABASE_URL: 'mysql://app:app@127.0.0.1:3306/app?serverVersion=8.0'
          MESSENGER_TRANSPORT_DSN: 'in-memory://'
          REDIS_URL: 'redis://127.0.0.1:6379'
          API_KEY: 'ci-api-key'
        run: bin/console cache:warmup --env=dev

      - name: ${{ matrix.tool }}
        run: ${{ matrix.run }}

  # HMAI-343: the OpenAPI contract as a CI gate. Dumps the static openapi.json,
  # publishes it as a build artifact (input for the generated mobile client), and
  # lints it with Spectral — an error-severity finding (a structurally invalid
  # spec) blocks the merge. The response↔schema conformance tests ride the `tests`
  # job (they are PHPUnit integration tests). Closes epic HMAI-311.
  openapi-contract:
    name: OpenAPI contract (dump + Spectral lint)
    runs-on: ubuntu-latest
    # HMAI-343 / HMAI-358: a kernel boot to dump + a Spectral lint of a ~150 KB
    # spec is ~30 s; capped generously for a cold-cache boot.
    timeout-minutes: 5
    defaults:
      run:
        working-directory: app
    env:
      # nelmio:apidoc:dump boots the container (dev) to read the route attributes;
      # it never contacts MySQL/Redis, so dummy DSNs are enough to compile the DI
      # container (same trick as the static-analysis cache warmup above).
      APP_ENV: dev
      APP_DEBUG: '1'
      DATABASE_URL: 'mysql://app:app@127.0.0.1:3306/app?serverVersion=8.0'
      MESSENGER_TRANSPORT_DSN: 'in-memory://'
      REDIS_URL: 'redis://127.0.0.1:6379'
      API_KEY: 'ci-api-key'
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, redis, amqp, bcmath, sodium
          coverage: none
          tools: composer:v2

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('app/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Make console executable
        run: chmod +x bin/console

      - name: Dump OpenAPI contract
        run: bin/console nelmio:apidoc:dump --format=json --no-ansi > "$GITHUB_WORKSPACE/openapi.json"

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Spectral gate: --fail-severity=error means a structurally invalid spec fails
      # the merge, while style findings stay non-blocking warnings. CLI pinned for
      # reproducibility; .spectral.yaml lives at the repo root.
      - name: Lint OpenAPI contract (Spectral)
        working-directory: ${{ github.workspace }}
        run: npx --yes @stoplight/spectral-cli@6.16.1 lint openapi.json --ruleset .spectral.yaml --fail-severity=error

      - name: Upload OpenAPI contract artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openapi-spec
          path: openapi.json
          retention-days: 30

  tests:
    name: PHPUnit (unit + integration)
    runs-on: ubuntu-latest
    # HMAI-154 / HMAI-358: paratest (HMAI-355) cut the peak to ~2m15s. Kept the
    # highest headroom of any job — integration tests spin up MySQL/Redis
    # containers and the coverage merge + cold caches add real variance.
    timeout-minutes: 12
    defaults:
      run:
        working-directory: app

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homemanager_test
          MYSQL_USER: homemanager
          MYSQL_PASSWORD: homemanager
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: test
      APP_DEBUG: '1'
      # Mirrors app/.env.test (API_KEY, token cipher keys) and overrides .env defaults
      # for service hosts so they resolve to the GitHub-provided service containers.
      #
      # IMPORTANT: dbname is the BASE name "homemanager" — doctrine.yaml has
      # `when@test: dbname_suffix: '_test'` (Symfony default), so Doctrine
      # connects to "homemanager_test" at runtime. The MySQL service below
      # creates exactly that database. If you put "homemanager_test" here,
      # Doctrine appends *another* `_test` and looks for "homemanager_test_test".
      DATABASE_URL: 'mysql://homemanager:homemanager@127.0.0.1:3306/homemanager?serverVersion=8.0&charset=utf8mb4'
      REDIS_URL: 'redis://127.0.0.1:6379'
      LOCK_DSN: 'redis://127.0.0.1:6379'
      MESSENGER_TRANSPORT_DSN: 'in-memory://'
      API_KEY: 'test-api-key'
      # HMAI-355: paratest worker count. Each worker runs in its own database
      # (homemanager_test{token}) + Redis logical DB, so the suite parallelises
      # without integration tests colliding on shared MySQL/Redis.
      PARATEST_PROCESSES: '4'

    steps:
      # HMAI-358: record the job start so the final step can publish this job's
      # wall-clock to the summary next to the coverage metrics (time-regression
      # visibility per run). working-directory is the repo root — app/ does not
      # exist until checkout.
      - name: Record job start
        working-directory: ${{ github.workspace }}
        run: echo "CI_JOB_START=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, redis, amqp, bcmath, sodium
          # HMAI-245: pcov drives the coverage report + threshold gate below.
          # setup-php enables it globally, so paratest worker processes inherit it.
          coverage: pcov
          tools: composer:v2

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      # HMAI-353: also cache app/vendor (not just the download dir) so an
      # unchanged composer.lock skips the extract step of composer install.
      # PHP-versioned, vendor-scoped key: the autoloader is platform-checked and
      # must not collide with the download-only key the other jobs still use.
      # composer install stays — on a hit it is a fast verify + a rerun of the
      # post-install scripts (autoloader dump, assets:install).
      - uses: actions/cache@v6
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            app/vendor
          key: ${{ runner.os }}-php8.5-composer-vendor-${{ hashFiles('app/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.5-composer-vendor-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Make console executable
        run: chmod +x bin/console

      # Service-container health-checks generally catch readiness, but a short
      # safety loop guards against the rare case where the runner advances
      # before the first ping succeeds.
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uhomemanager -phomemanager --silent && exit 0
            echo "Waiting for MySQL ($i/30)..."
            sleep 1
          done
          echo "MySQL did not become ready in time"
          exit 1

      # HMAI-355: paratest runs the suite across PARATEST_PROCESSES workers, each
      # bound to its own database (homemanager_test{token}, via the dbname_suffix
      # in doctrine.yaml) so integration tests never collide on shared MySQL. The
      # root account provisions + grants one database per worker token; the app
      # connects as `homemanager`.
      - name: Create parallel test databases
        run: |
          for i in $(seq 1 "$PARATEST_PROCESSES"); do
            mysql -h127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS homemanager_test${i} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; GRANT ALL PRIVILEGES ON homemanager_test${i}.* TO 'homemanager'@'%';"
          done

      - name: Run database migrations (per parallel test DB)
        run: |
          for i in $(seq 1 "$PARATEST_PROCESSES"); do
            TEST_TOKEN=$i bin/console doctrine:migrations:migrate --no-interaction
          done

      # HMAI-148: blocks merge if ORM XML mapping drifts from the migrated
      # MySQL schema (added field without migration, added column without
      # mapping, type mismatch). Surfaces drift as its own failure category
      # rather than as an opaque hydration exception inside PHPUnit.
      # TEST_TOKEN=1 targets homemanager_test1 (migrated above); without a token
      # it would hit the empty, unmigrated homemanager_test and report false drift.
      - name: Validate Doctrine schema
        run: TEST_TOKEN=1 bin/console doctrine:schema:validate

      # HMAI-41: FrontendControllerTest hits Twig templates that call
      # encore_entry_link_tags('app') / encore_entry_script_tags('app'),
      # which require public/build/entrypoints.json from a real Encore build.
      # Without this build step the templates throw and all Frontend page
      # smoke tests return 500 → 7 false failures.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      # HMAI-150: block merge on high/critical CVEs in frontend deps (Encore,
      # Stimulus, transitive build-time tooling). low/moderate are noise here.
      - name: npm audit (high+critical)
        run: npm audit --audit-level=high

      # HMAI-246: Vitest unit tests for the frontend pure functions (util.js
      # helpers + Series sort/filter/rating-highlight). Fast, jsdom-based, no
      # browser — complements the slower Playwright E2E.
      - name: Run JS unit tests (Vitest)
        run: npm test

      - name: Build Webpack Encore assets
        run: npm run build

      # HMAI-355: paratest runs the suite in parallel across PARATEST_PROCESSES
      # workers (per-worker DB isolation above; Redis isolation in
      # tests/bootstrap.php), then merges the partial coverage into one clover
      # the threshold gate reads. pcov is enabled globally by setup-php, so the
      # worker processes inherit it.
      - name: PHPUnit (paratest, parallel) with coverage
        run: vendor/bin/paratest -p "$PARATEST_PROCESSES" --coverage-clover var/coverage/clover.xml --coverage-html var/coverage/html

      # HMAI-357: a one-line history file holding the last run's coverage % so the
      # gate step below can print a run-over-run trend in the job summary.
      # restore-keys picks the most recent history cache; the run-id key persists
      # this run's value at post-job for the next run to read.
      - name: Restore coverage trend history
        uses: actions/cache@v6
        with:
          path: app/var/coverage-history.txt
          key: coverage-history-${{ github.run_id }}
          restore-keys: coverage-history-

      # HMAI-245: informational baseline gate. Measured ~93.66% line coverage;
      # the build fails if coverage regresses below the floor (kept in sync with
      # the Makefile COVERAGE_MIN). Tighten over time (HMAI-357 ratchet procedure
      # in README). --history additionally publishes the run-over-run coverage
      # trend to the job summary; it does not affect the pass/fail decision.
      - name: Enforce coverage threshold + publish trend
        run: php bin/coverage-check.php var/coverage/clover.xml 90 --history=var/coverage-history.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/var/coverage/
          retention-days: 30

      # HMAI-358: publish this job's wall-clock to the job summary, next to the
      # coverage table above. GitHub also shows per-step timings natively in the
      # Actions UI; this surfaces the headline number for time-regression watching.
      - name: Publish job timing
        if: always()
        run: echo "⏱ **PHPUnit (tests) job** wall-clock — $(( $(date +%s) - ${CI_JOB_START:-$(date +%s)} ))s." >> "$GITHUB_STEP_SUMMARY"

  e2e-playwright:
    name: Playwright E2E (desktop + mobile)
    needs: tests
    runs-on: ubuntu-latest
    # HMAI-154 / HMAI-358: ~3m10s observed. The Playwright browser cache
    # (HMAI-354) removes the per-run download on a hit, but a cold-cache download +
    # the Lighthouse audit keep the headroom generous. Longest job.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homemanager_test
          MYSQL_USER: homemanager
          MYSQL_PASSWORD: homemanager
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: test
      APP_DEBUG: '1'
      # Base dbname "homemanager"; doctrine when@test appends _test → connects to
      # "homemanager_test" (same convention as the `tests` job above).
      DATABASE_URL: 'mysql://homemanager:homemanager@127.0.0.1:3306/homemanager?serverVersion=8.0&charset=utf8mb4'
      REDIS_URL: 'redis://127.0.0.1:6379'
      LOCK_DSN: 'redis://127.0.0.1:6379'
      # Smoke run: async EpisodeRated is dispatched but not consumed (no worker).
      # The series-detail average is computed live from the DB, so the rating test
      # still passes; the async Redis cache is orthogonal.
      MESSENGER_TRANSPORT_DSN: 'in-memory://'
      API_KEY: 'e2e-test-key'
      # 32-byte base64 keys — TokenCipher rejects any other length. Fake but valid;
      # no real secrets, and OAuth-init requests need a constructible cipher.
      DISCOGS_TOKEN_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
      GOOGLE_TOKEN_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
      DISCOGS_CONSUMER_KEY: e2e
      DISCOGS_CONSUMER_SECRET: e2e
      LASTFM_API_KEY: e2e
      LASTFM_USERNAME: e2e
      DISCOGS_USERNAME: e2e

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, redis, amqp, bcmath, sodium
          coverage: none
          tools: composer:v2

      # Symfony local server routes Symfony paths AND serves Encore build assets
      # from public/. Bare `php -S` cannot do both (no router → 404 on routes;
      # index.php router → 404 on static assets), which would break the Series UI.
      - name: Install Symfony CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/symfony/stable/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y symfony-cli

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('app/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Make console executable
        run: chmod +x bin/console

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            package-lock.json

      - name: Install Encore dependencies
        run: npm ci

      # HMAI-150: gate frontend deps before build.
      - name: npm audit (high+critical, Encore)
        run: npm audit --audit-level=high

      - name: Build Webpack Encore assets
        run: npm run build

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uhomemanager -phomemanager --silent && exit 0
            echo "Waiting for MySQL ($i/30)..."
            sleep 1
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run database migrations
        run: bin/console doctrine:migrations:migrate --no-interaction

      - name: Install Playwright dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      # HMAI-354: cache the Playwright browser binaries (~/.cache/ms-playwright,
      # ~100-200 MB) so a run with an unchanged @playwright/test version skips the
      # download. Keyed on the exact resolved version (no restore-keys) so a
      # version bump misses and re-downloads a matching build. The install step
      # below stays: on a cache hit it finds the browsers present and only ensures
      # the OS deps (apt), on a miss it downloads and populates the cache.
      - name: Resolve Playwright version
        id: playwright-version
        working-directory: ${{ github.workspace }}
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        working-directory: ${{ github.workspace }}
        run: npx playwright install --with-deps chromium

      - name: Start application server
        run: symfony server:start --no-tls --port=8080 --daemon

      - name: Wait for application
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/health || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "App responding (HTTP $code)"
              exit 0
            fi
            echo "Waiting for app ($i/30)..."
            sleep 1
          done
          echo "App did not become ready in time"
          exit 1

      - name: Run Playwright tests
        working-directory: ${{ github.workspace }}
        env:
          E2E_BASE_URL: 'http://127.0.0.1:8080'
          E2E_API_KEY: 'e2e-test-key'
        run: npx playwright test --reporter=github,html

      # HMAI-350: PWA installability gate. Lighthouse 12 removed the PWA category,
      # so @lhci/cli is pinned to 0.13 (Lighthouse 11) and asserts the surviving
      # `installable-manifest` audit (config in lighthouserc.json) against the
      # already-running server, using the runner's pre-installed Chrome. A broken
      # manifest / lost icons drops the score below 1 and blocks the merge. The
      # in-browser SW + offline behaviour is covered by pwa.mobile.spec.ts above.
      - name: PWA installability audit (Lighthouse CI)
        working-directory: ${{ github.workspace }}
        run: |
          npx --yes @lhci/cli@0.13.0 collect --config=lighthouserc.json
          npx --yes @lhci/cli@0.13.0 assert --config=lighthouserc.json

      - name: Stop application server
        if: always()
        run: symfony server:stop || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  e2e-newman:
    name: Newman API smoke
    needs: tests
    runs-on: ubuntu-latest
    # HMAI-154 / HMAI-358: ~1m30s observed (symfony-cli install + service startup
    # dominate). Newman is the lightest job.
    timeout-minutes: 7
    defaults:
      run:
        working-directory: app

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: homemanager_test
          MYSQL_USER: homemanager
          MYSQL_PASSWORD: homemanager
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: test
      APP_DEBUG: '1'
      DATABASE_URL: 'mysql://homemanager:homemanager@127.0.0.1:3306/homemanager?serverVersion=8.0&charset=utf8mb4'
      REDIS_URL: 'redis://127.0.0.1:6379'
      LOCK_DSN: 'redis://127.0.0.1:6379'
      MESSENGER_TRANSPORT_DSN: 'in-memory://'
      API_KEY: 'e2e-test-key'
      DISCOGS_TOKEN_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
      GOOGLE_TOKEN_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
      DISCOGS_CONSUMER_KEY: e2e
      DISCOGS_CONSUMER_SECRET: e2e
      LASTFM_API_KEY: e2e
      LASTFM_USERNAME: e2e
      DISCOGS_USERNAME: e2e

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, redis, amqp, bcmath, sodium
          coverage: none
          tools: composer:v2

      - name: Install Symfony CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/symfony/stable/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y symfony-cli

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('app/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Make console executable
        run: chmod +x bin/console

      # Newman hits only /api/* and /auth/* (JSON) — no Encore assets needed.
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Newman dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uhomemanager -phomemanager --silent && exit 0
            echo "Waiting for MySQL ($i/30)..."
            sleep 1
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run database migrations
        run: bin/console doctrine:migrations:migrate --no-interaction

      - name: Start application server
        run: symfony server:start --no-tls --port=8080 --daemon

      - name: Wait for application
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/health || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "App responding (HTTP $code)"
              exit 0
            fi
            echo "Waiting for app ($i/30)..."
            sleep 1
          done
          echo "App did not become ready in time"
          exit 1

      # base_url forced to 127.0.0.1 (collection default is localhost, which can
      # resolve to ::1 while the Symfony server binds IPv4). --ignore-redirects is
      # required so OAuth-init requests assert 302/502 instead of following to the
      # provider.
      - name: Run Newman API smoke tests
        working-directory: ${{ github.workspace }}
        run: >-
          npx newman run tests-e2e/postman/AIHomeManager.postman_collection.json
          --ignore-redirects
          --env-var "base_url=http://127.0.0.1:8080/api"
          --env-var "api_key=e2e-test-key"
          --reporters cli,htmlextra
          --reporter-htmlextra-export newman-report.html

      - name: Stop application server
        if: always()
        run: symfony server:stop || true

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: newman-report
          path: newman-report.html
          retention-days: 30
