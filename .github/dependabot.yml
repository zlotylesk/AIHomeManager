# HMAI-152: weekly dependency surveillance. Composer + npm (frontend + root)
# + GitHub Actions ecosystems each get scheduled PRs from `dependabot[bot]`.
# Groups collapse symfony/* and doctrine/* into single PRs so an 8-package
# Symfony bump does not produce 8 separate reviews.
#
# Manual fallback: `make audit` (composer) and `make node-audit` (frontend
# npm) still run in CI for high+critical CVEs — Dependabot covers freshness,
# audit covers severity-gated regressions.
version: 2
updates:
  - package-ecosystem: composer
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      symfony:
        patterns:
          - "symfony/*"
      doctrine:
        patterns:
          - "doctrine/*"
      dev:
        dependency-type: development

  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # @symfony/webpack-encore@6 pins peer webpack-cli@^6 — a major bump
      # (e.g. 7.x) breaks `npm ci` with ERESOLVE. Block semver-major until
      # Encore is upgraded to a release supporting webpack-cli 7 (HMAI-222).
      - dependency-name: "webpack-cli"
        update-types: ["version-update:semver-major"]
      # Same trap: Encore 6 peer-deps @babel/core@^7.17.0, so a Babel 8 major
      # (core 8.x / preset-env 8.x) breaks `npm ci` with ERESOLVE. Block
      # semver-major until Encore is upgraded to a release supporting Babel 8.
      - dependency-name: "@babel/core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@babel/preset-env"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
