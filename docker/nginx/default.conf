server {
    listen 80;
    server_tokens off;
    root /var/www/html/public;
    index index.php;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Service Worker (HMAI-351): the worker is served from the site root so its scope
    # is the whole origin (a hashed /build/ path would narrow it — the Notifications
    # HMAI-280 rule). `no-cache` forces the browser to revalidate /sw.js on every
    # navigation, so a freshly deployed app-shell is adopted at once instead of being
    # shadowed by an HTTP-cached old worker (the core update-propagation guarantee).
    # A location-level `add_header` REPLACES the server-level ones, so the four
    # security headers are repeated here to keep /sw.js consistent with SecurityHeadersListener
    # and every other response. `Service-Worker-Allowed: /` is redundant for a
    # root-served worker but pins the intended scope explicitly.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        add_header Service-Worker-Allowed "/" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        include fastcgi_params;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
