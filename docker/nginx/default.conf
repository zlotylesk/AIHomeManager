server {
    listen 80;
    server_tokens off;
    root /var/www/html/public;
    index index.php;

    # OWASP Secure Headers — "always" propagates to 4xx/5xx responses too (HMAI-137)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # HSTS — uncomment AFTER configuring HTTPS (separate ticket)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Forward client IP so Symfony per-IP rate limiter sees real callers, not the nginx container.
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        include fastcgi_params;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
