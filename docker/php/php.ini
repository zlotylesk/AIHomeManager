memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
date.timezone = Europe/Warsaw

; pcov is the code-coverage driver (HMAI-245). Disabled by default so normal
; runs (the app, `make test`) pay zero overhead; `make test-coverage` enables
; it per-run via `php -d pcov.enabled=1`.
pcov.enabled = 0