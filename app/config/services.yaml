# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # HMAI-114: Discogs OAuth1 replay protection rejects requests whose
    # timestamp deviates too far from the server clock. 300s matches OAuth1's
    # de facto reject threshold; tighten or loosen here if Discogs publishes
    # different guidance without touching application code.
    app.discogs_clock_drift.threshold_seconds: 300

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Infrastructure\Backup\DatabaseBackupService:
        arguments:
            $databaseUrl: '%env(DATABASE_URL)%'
            $backupDir: '%env(BACKUP_DIR)%'

    App\Module\Series\Domain\Repository\SeriesRepositoryInterface:
        alias: App\Module\Series\Infrastructure\Persistence\DoctrineSeriesRepository

    app.redis:
        class: \Redis
        factory: ['Symfony\Component\Cache\Adapter\RedisAdapter', 'createConnection']
        arguments: ['%env(REDIS_URL)%']

    App\Module\Series\Infrastructure\Messenger\EpisodeRatedHandler:
        arguments:
            $redis: '@app.redis'

    # Delete handlers invalidate the cached series/season averages after removal.
    App\Module\Series\Application\Handler\DeleteSeriesHandler:
        arguments:
            $redis: '@app.redis'

    App\Module\Series\Application\Handler\DeleteSeasonHandler:
        arguments:
            $redis: '@app.redis'

    App\Module\Series\Application\Handler\DeleteEpisodeHandler:
        arguments:
            $redis: '@app.redis'

    # HMAI-176: the bare UDP transport throws the instant a log line is shipped to
    # an unreachable Graylog (e.g. getaddrinfo for "graylog" fails when the monitoring
    # stack is down). Because the `series` and `auth` Monolog channels log on the
    # request path, that exception bubbled out and turned core endpoints like
    # /api/series into a 500. IgnoreErrorTransportWrapper swallows transport-level
    # errors so a dead log sink degrades silently instead of breaking the request.
    gelf.transport.udp:
        class: Gelf\Transport\UdpTransport
        arguments:
            - '%env(GRAYLOG_HOST)%'
            - '%env(int:GRAYLOG_PORT)%'

    gelf.transport:
        class: Gelf\Transport\IgnoreErrorTransportWrapper
        arguments:
            - '@gelf.transport.udp'

    gelf.publisher:
        class: Gelf\Publisher
        arguments:
            - '@gelf.transport'

    App\Module\Series\Infrastructure\Logging\NewRelicMonologHandler: ~

    App\Module\Tasks\Domain\Repository\TaskRepositoryInterface:
        alias: App\Module\Tasks\Infrastructure\Persistence\DoctrineTaskRepository

    App\Module\Books\Domain\Repository\BookRepositoryInterface:
        alias: App\Module\Books\Infrastructure\Persistence\DoctrineBookRepository

    App\Module\Music\Application\QueryHandler\GetMusicComparisonHandler:
        arguments:
            $redis: '@app.redis'
            $lastfmUsername: '%env(LASTFM_USERNAME)%'
            $discogsUsername: '%env(DISCOGS_USERNAME)%'

    App\Module\Music\Domain\Repository\ListeningSessionRepositoryInterface:
        alias: App\Module\Music\Infrastructure\Persistence\DoctrineListeningSessionRepository

    App\Module\Music\Domain\Port\VinylCollectionInterface:
        alias: App\Module\Music\Infrastructure\External\DiscogsApiClient

    App\Module\Music\Domain\Port\VinylCollectionLoaderInterface:
        alias: App\Module\Music\Infrastructure\External\DiscogsApiClient

    # HMAI-113: ctor takes a single VO so DI debug output (debug:container
    # --show-arguments) and stack traces redact the consumer secret.
    App\Module\Music\Infrastructure\External\DiscogsCredentials:
        arguments:
            $consumerKey: '%env(DISCOGS_CONSUMER_KEY)%'
            $consumerSecret: '%env(DISCOGS_CONSUMER_SECRET)%'

    App\Module\Music\Infrastructure\External\DiscogsClockDriftDetector:
        arguments:
            $thresholdSeconds: '%app.discogs_clock_drift.threshold_seconds%'

    App\Module\Music\Infrastructure\External\DiscogsApiClient:
        arguments:
            $httpClient: '@app.discogs_http_client'
            $redis: '@app.redis'

    App\Module\Music\Infrastructure\Persistence\DiscogsTokenRepositoryInterface:
        alias: App\Module\Music\Infrastructure\Persistence\DiscogsTokenRepository

    # Per-provider key isolates blast radius — use named instances, not the typehint.
    App\Security\TokenCipher:
        abstract: true

    app.discogs_token_cipher:
        class: App\Security\TokenCipher
        arguments:
            $key: '%env(base64:DISCOGS_TOKEN_KEY)%'

    app.google_token_cipher:
        class: App\Security\TokenCipher
        arguments:
            $key: '%env(base64:GOOGLE_TOKEN_KEY)%'

    app.trakt_token_cipher:
        class: App\Security\TokenCipher
        arguments:
            $key: '%env(base64:TRAKT_TOKEN_KEY)%'

    App\Module\Music\Infrastructure\Persistence\DiscogsTokenRepository:
        arguments:
            $cipher: '@app.discogs_token_cipher'

    App\Module\Tasks\Infrastructure\Persistence\GoogleOAuthTokenRepository:
        arguments:
            $cipher: '@app.google_token_cipher'

    # Trakt OAuth2 (HMAI-180) — separate cipher key isolates blast radius.
    App\Module\Series\Infrastructure\Persistence\TraktOAuthTokenRepository:
        arguments:
            $cipher: '@app.trakt_token_cipher'

    App\Module\Series\Infrastructure\Persistence\TraktTokenRepositoryInterface:
        alias: App\Module\Series\Infrastructure\Persistence\TraktOAuthTokenRepository

    App\Module\Series\Infrastructure\External\TraktTokenProvider:
        arguments:
            $clientId: '%env(TRAKT_CLIENT_ID)%'
            $clientSecret: '%env(TRAKT_CLIENT_SECRET)%'
            $redirectUri: '%env(TRAKT_REDIRECT_URI)%'

    App\Controller\TraktAuthController:
        arguments:
            $clientId: '%env(TRAKT_CLIENT_ID)%'
            $clientSecret: '%env(TRAKT_CLIENT_SECRET)%'
            $redirectUri: '%env(TRAKT_REDIRECT_URI)%'

    App\Controller\DiscogsAuthController:
        arguments:
            $callbackUrl: '%env(DISCOGS_CALLBACK_URL)%'

    App\Controller\MusicController:
        arguments:
            $lastfmUsername: '%env(LASTFM_USERNAME)%'
            $discogsUsername: '%env(DISCOGS_USERNAME)%'

    App\Module\Music\Domain\Port\MusicListeningHistoryInterface:
        alias: App\Module\Music\Infrastructure\External\LastFmApiClient

    App\Module\Music\Infrastructure\External\LastFmApiClient:
        arguments:
            $httpClient: '@app.lastfm_http_client'
            $redis: '@app.redis'
            $apiKey: '%env(LASTFM_API_KEY)%'

    App\Module\Books\Domain\Port\BookMetadataProviderInterface:
        alias: App\Module\Books\Infrastructure\External\NationalLibraryApiClient

    App\Module\Books\Infrastructure\External\NationalLibraryApiClient:
        arguments:
            $httpClient: '@app.national_library_http_client'
            $redis: '@app.redis'

    App\Module\Tasks\Domain\Port\CalendarServiceInterface:
        alias: App\Module\Tasks\Infrastructure\Google\GoogleCalendarService

    App\Module\Tasks\Infrastructure\Google\GoogleClientFactory:
        arguments:
            $clientId: '%env(GOOGLE_CLIENT_ID)%'
            $clientSecret: '%env(GOOGLE_CLIENT_SECRET)%'
            $redirectUri: '%env(GOOGLE_REDIRECT_URI)%'

    google.client:
        class: Google\Client
        factory: ['@App\Module\Tasks\Infrastructure\Google\GoogleClientFactory', 'create']

    App\Module\Tasks\Infrastructure\Persistence\GoogleTokenRepositoryInterface:
        alias: App\Module\Tasks\Infrastructure\Persistence\GoogleOAuthTokenRepository

    App\Module\Tasks\Infrastructure\Google\GoogleCalendarService:
        arguments:
            $client: '@google.client'

    App\Controller\GoogleAuthController:
        arguments:
            $client: '@google.client'

    App\Module\Articles\Domain\Repository\ArticleRepositoryInterface:
        alias: App\Module\Articles\Infrastructure\Persistence\DoctrineArticleRepository

    App\Module\Articles\Domain\Repository\ArticleDailyPickRepositoryInterface:
        alias: App\Module\Articles\Infrastructure\Persistence\DoctrineArticleDailyPickRepository

    App\Module\YouTubeProgress\Domain\Repository\VideoRepositoryInterface:
        alias: App\Module\YouTubeProgress\Infrastructure\Persistence\DoctrineVideoRepository

    App\Module\YouTubeProgress\Domain\Repository\WatchSessionRepositoryInterface:
        alias: App\Module\YouTubeProgress\Infrastructure\Persistence\DoctrineWatchSessionRepository

    App\Module\YouTubeProgress\Domain\Port\YouTubePlaylistReaderInterface:
        alias: App\Module\YouTubeProgress\Infrastructure\External\YouTubeApiClient

    App\Module\YouTubeProgress\Domain\Port\YouTubePlaylistWriterInterface:
        alias: App\Module\YouTubeProgress\Infrastructure\External\YouTubeApiClient

    App\Module\YouTubeProgress\Infrastructure\External\YouTubeApiClient:
        arguments:
            $httpClient: '@app.youtube_http_client'

    App\Module\Articles\Application\QueryHandler\GetArticleOfTheDayHandler:
        arguments:
            $redis: '@app.redis'
            $preferredCategory: '%articles.preferred_category%'

    App\Module\Articles\Application\Handler\MarkArticleAsReadHandler:
        arguments:
            $redis: '@app.redis'

    App\Module\Articles\Application\Handler\DeleteArticleHandler:
        arguments:
            $redis: '@app.redis'

    App\Security\ApiKeyAuthenticator:
        arguments:
            $expectedApiKey: '%env(API_KEY)%'

    # Rate limiting: per-IP throttle for /api/* endpoints (HMAI-38)
    App\EventListener\ApiRateLimitListener:
        arguments:
            $apiPerIpLimiter: '@limiter.api_per_ip'

    App\Http\RateLimitedHttpClient:
        abstract: true

    app.discogs_http_client:
        class: App\Http\RateLimitedHttpClient
        arguments:
            $inner: '@http_client'
            $limiterFactory: '@limiter.discogs_api'
            $limiterName: 'discogs_api'

    app.lastfm_http_client:
        class: App\Http\RateLimitedHttpClient
        arguments:
            $inner: '@http_client'
            $limiterFactory: '@limiter.lastfm_api'
            $limiterName: 'lastfm_api'

    app.national_library_http_client:
        class: App\Http\RateLimitedHttpClient
        arguments:
            $inner: '@http_client'
            $limiterFactory: '@limiter.national_library_api'
            $limiterName: 'national_library_api'

    app.youtube_http_client:
        class: App\Http\RateLimitedHttpClient
        arguments:
            $inner: '@http_client'
            $limiterFactory: '@limiter.youtube_api'
            $limiterName: 'youtube_api'

    app.trakt_http_client:
        class: App\Http\RateLimitedHttpClient
        arguments:
            $inner: '@http_client'
            $limiterFactory: '@limiter.trakt_api'
            $limiterName: 'trakt_api'

    App\Module\Series\Infrastructure\External\TraktApiClient:
        arguments:
            $httpClient: '@app.trakt_http_client'
            $clientId: '%env(TRAKT_CLIENT_ID)%'

when@test:
    services:
        # Spy logger lets ApiRateLimitTest assert the listener emits the expected
        # warning + rate_limit_triggered=true context (Graylog AC).
        App\Tests\Support\SpyLogger:
            public: true

        # Override must keep autoconfigure: true so the #[AsEventListener] attribute
        # still wires the listener into kernel.event_listener — without it the listener
        # is never invoked and rate limiting silently disables in tests.
        App\EventListener\ApiRateLimitListener:
            autoconfigure: true
            arguments:
                $apiPerIpLimiter: '@limiter.api_per_ip'
                $logger: '@App\Tests\Support\SpyLogger'

        # HMAI-176: the test env routes the series/auth channels to null handlers, so
        # the GELF services have no consumer and would be pruned from the container.
        # Public aliases keyed by class name keep them reachable for
        # GelfTransportResilienceTest, fetched via ::class (same pattern as SpyLogger)
        # so phpstan-symfony resolves them without a dev-container lookup.
        Gelf\Transport\IgnoreErrorTransportWrapper:
            alias: gelf.transport
            public: true
        Gelf\Publisher:
            alias: gelf.publisher
            public: true
