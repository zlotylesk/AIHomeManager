framework:
    rate_limiter:
        api_per_ip:
            policy: 'sliding_window'
            limit: 60
            interval: '1 minute'
            cache_pool: 'cache.rate_limiter'

        discogs_api:
            policy: 'token_bucket'
            limit: 60
            rate: { interval: '1 minute', amount: 60 }
            cache_pool: 'cache.rate_limiter'

        lastfm_api:
            policy: 'token_bucket'
            limit: 5
            rate: { interval: '1 second', amount: 5 }
            cache_pool: 'cache.rate_limiter'

        national_library_api:
            policy: 'token_bucket'
            limit: 10
            rate: { interval: '1 second', amount: 1 }
            cache_pool: 'cache.rate_limiter'

        youtube_api:
            policy: 'token_bucket'
            limit: 60
            rate: { interval: '1 minute', amount: 60 }
            cache_pool: 'cache.rate_limiter'

        trakt_api:
            policy: 'token_bucket'
            limit: 1000
            rate: { interval: '5 minutes', amount: 1000 }
            cache_pool: 'cache.rate_limiter'

        # Spotify publishes no fixed quota — it rate-limits on a rolling 30-second
        # window and answers 429 with Retry-After. A podcast poll is 1 + N calls
        # across the saved shows, so this is sized to let a whole sweep through
        # comfortably while still throttling a runaway loop.
        spotify_api:
            policy: 'token_bucket'
            limit: 180
            rate: { interval: '1 minute', amount: 180 }
            cache_pool: 'cache.rate_limiter'

when@test:
    services:
        rate_limiter.test_storage:
            class: Symfony\Component\RateLimiter\Storage\InMemoryStorage

    framework:
        rate_limiter:
            api_per_ip:
                policy: 'sliding_window'
                limit: 60
                interval: '1 minute'
                storage_service: 'rate_limiter.test_storage'

            discogs_api:
                policy: 'no_limit'
            lastfm_api:
                policy: 'no_limit'
            national_library_api:
                policy: 'no_limit'
            youtube_api:
                policy: 'no_limit'
            trakt_api:
                policy: 'no_limit'
            spotify_api:
                policy: 'no_limit'
