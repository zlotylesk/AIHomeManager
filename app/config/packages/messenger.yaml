framework:
    messenger:
        default_bus: command.bus
        failure_transport: failed

        buses:
            command.bus: ~
            query.bus: ~
            event.bus:
                default_middleware:
                    allow_no_handlers: true

        transports:
            in_memory:
                dsn: 'in-memory://'
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: series_events
                        type: topic
                    queues:
                        series_events:
                            binding_keys: ['#']
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 30000
            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: series_events_failed
                        type: direct
                    queues:
                        series_events_failed: ~

        routing:
            App\Module\Series\Domain\Event\EpisodeRated: async
            App\Module\Series\Application\Command\ImportWatchedShowsFromTrakt: async
            App\Module\Series\Application\Command\ImportRatingsFromTrakt: async
            App\Module\Music\Application\Command\RefreshDiscogsCollection: async
            App\Module\Music\Application\Command\PollLastFmRecentTracks: async

when@test:
    framework:
        messenger:
            transports:
                async:
                    dsn: 'in-memory://'
                failed:
                    dsn: 'in-memory://'
