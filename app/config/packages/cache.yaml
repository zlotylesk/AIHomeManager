framework:
    cache:
        default_redis_provider: '%env(REDIS_URL)%'

        pools:
            cache.rate_limiter:
                adapter: cache.adapter.redis
                default_lifetime: 3600
            cache.search:
                adapter: cache.adapter.redis
                default_lifetime: 300
            cache.dashboard:
                adapter: cache.adapter.redis
                default_lifetime: 300
            # Trends read cache (HMAI-334). Longer than the cockpit's TTL because a
            # trend bucket is a whole week or month — 15 minutes of staleness is
            # invisible on a "how has this been going" chart.
            cache.insights:
                adapter: cache.adapter.redis
                default_lifetime: 900

when@test:
    framework:
        cache:
            pools:
                cache.rate_limiter:
                    adapter: cache.adapter.array
                cache.search:
                    adapter: cache.adapter.array
                cache.dashboard:
                    adapter: cache.adapter.array
                cache.insights:
                    adapter: cache.adapter.array
