doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        schema_filter: '~^(?!google_oauth_tokens|discogs_oauth_tokens|trakt_oauth_tokens|watch_session_videos|search_documents)~'
        types:
            task_status: App\Module\Tasks\Infrastructure\Persistence\Doctrine\Type\TaskStatusType
            book_status: App\Module\Books\Infrastructure\Persistence\Doctrine\Type\BookStatusType
            series_status: App\Module\Series\Infrastructure\Persistence\Doctrine\Type\SeriesStatusType
            series_rating: App\Module\Series\Infrastructure\Persistence\Doctrine\Type\RatingType
            listening_source: App\Module\Music\Infrastructure\Persistence\Doctrine\Type\ListeningSourceType
            goal_type: App\Module\Goals\Infrastructure\Persistence\Doctrine\Type\GoalTypeType
            goal_period: App\Module\Goals\Infrastructure\Persistence\Doctrine\Type\GoalPeriodType
            movie_rating: App\Module\Movies\Infrastructure\Persistence\Doctrine\Type\RatingType
            movie_status: App\Module\Movies\Infrastructure\Persistence\Doctrine\Type\MovieStatusType
            notification_type: App\Module\Notifications\Infrastructure\Persistence\Doctrine\Type\NotificationTypeType
            quiet_hours: App\Module\Notifications\Infrastructure\Persistence\Doctrine\Type\QuietHoursType


        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore
        auto_mapping: false
        mappings:
            SeriesDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Series/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\Series\Domain\Entity'
            ArticlesDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Articles/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\Articles\Domain\Entity'
            ArticlesDomainValueObjects:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Articles/Infrastructure/Persistence/Doctrine/ValueObject'
                prefix: 'App\Module\Articles\Domain\ValueObject'
            TasksDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Tasks/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\Tasks\Domain\Entity'
            TasksDomainValueObjects:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Tasks/Infrastructure/Persistence/Doctrine/ValueObject'
                prefix: 'App\Module\Tasks\Domain\ValueObject'
            BooksDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Books/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\Books\Domain\Entity'
            BooksDomainValueObjects:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Books/Infrastructure/Persistence/Doctrine/ValueObject'
                prefix: 'App\Module\Books\Domain\ValueObject'
            MusicDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Music/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\Music\Domain\Entity'
            MusicDomainValueObjects:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Music/Infrastructure/Persistence/Doctrine/ValueObject'
                prefix: 'App\Module\Music\Domain\ValueObject'
            YouTubeProgressDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/YouTubeProgress/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\YouTubeProgress\Domain\Entity'
            GoalsDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Goals/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\Goals\Domain\Entity'
            GoalsDomainValueObjects:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Goals/Infrastructure/Persistence/Doctrine/ValueObject'
                prefix: 'App\Module\Goals\Domain\ValueObject'
            MoviesDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Movies/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\Movies\Domain\Entity'
            MoviesDomainValueObjects:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Movies/Infrastructure/Persistence/Doctrine/ValueObject'
                prefix: 'App\Module\Movies\Domain\ValueObject'
            NotificationsDomainEntities:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/src/Module/Notifications/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'App\Module\Notifications\Domain\Entity'

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
