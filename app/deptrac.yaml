deptrac:
    paths:
        - ./src

    exclude_files:
        - '#.*Tests.*#'

    # HMAI-146 — Architecture boundaries enforced as CI gate.
    #
    # Layers per module (Articles / Books / Music / Series / Tasks) × layer
    # (Domain / Application / Infrastructure) give cross-module isolation in
    # addition to the hexagonal direction rules. The `Glue` layer covers everything
    # outside src/Module/ (controllers, event listeners, kernel, security,
    # scheduled commands, etc.) and is allowed to wire any module together.
    #
    # The `Vendor` layer captures framework code (Symfony, Doctrine, Psr, …) so
    # that Domain → [] becomes a real rule: an `use Doctrine\…` inside any *Domain
    # layer is a violation. Application/Infrastructure may freely import Vendor —
    # that is the whole point of the hex outer ring.
    layers:
        - name: ArticlesDomain
          collectors:
              - type: directory
                value: src/Module/Articles/Domain/.*

        - name: ArticlesApplication
          collectors:
              - type: directory
                value: src/Module/Articles/Application/.*

        - name: ArticlesInfrastructure
          collectors:
              - type: directory
                value: src/Module/Articles/Infrastructure/.*

        - name: BooksDomain
          collectors:
              - type: directory
                value: src/Module/Books/Domain/.*

        - name: BooksApplication
          collectors:
              - type: directory
                value: src/Module/Books/Application/.*

        - name: BooksInfrastructure
          collectors:
              - type: directory
                value: src/Module/Books/Infrastructure/.*

        - name: DashboardDomain
          collectors:
              - type: directory
                value: src/Module/Dashboard/Domain/.*

        - name: DashboardApplication
          collectors:
              - type: directory
                value: src/Module/Dashboard/Application/.*

        - name: DashboardInfrastructure
          collectors:
              - type: directory
                value: src/Module/Dashboard/Infrastructure/.*

        - name: GoalsDomain
          collectors:
              - type: directory
                value: src/Module/Goals/Domain/.*

        - name: GoalsApplication
          collectors:
              - type: directory
                value: src/Module/Goals/Application/.*

        - name: GoalsInfrastructure
          collectors:
              - type: directory
                value: src/Module/Goals/Infrastructure/.*

        - name: InsightsDomain
          collectors:
              - type: directory
                value: src/Module/Insights/Domain/.*

        - name: InsightsApplication
          collectors:
              - type: directory
                value: src/Module/Insights/Application/.*

        - name: InsightsInfrastructure
          collectors:
              - type: directory
                value: src/Module/Insights/Infrastructure/.*

        - name: MoviesDomain
          collectors:
              - type: directory
                value: src/Module/Movies/Domain/.*

        - name: MoviesApplication
          collectors:
              - type: directory
                value: src/Module/Movies/Application/.*

        - name: MoviesInfrastructure
          collectors:
              - type: directory
                value: src/Module/Movies/Infrastructure/.*

        - name: MusicDomain
          collectors:
              - type: directory
                value: src/Module/Music/Domain/.*

        - name: MusicApplication
          collectors:
              - type: directory
                value: src/Module/Music/Application/.*

        - name: MusicInfrastructure
          collectors:
              - type: directory
                value: src/Module/Music/Infrastructure/.*

        - name: NotificationsDomain
          collectors:
              - type: directory
                value: src/Module/Notifications/Domain/.*

        - name: NotificationsApplication
          collectors:
              - type: directory
                value: src/Module/Notifications/Application/.*

        - name: NotificationsInfrastructure
          collectors:
              - type: directory
                value: src/Module/Notifications/Infrastructure/.*

        - name: PodcastsDomain
          collectors:
              - type: directory
                value: src/Module/Podcasts/Domain/.*

        - name: PodcastsApplication
          collectors:
              - type: directory
                value: src/Module/Podcasts/Application/.*

        - name: PodcastsInfrastructure
          collectors:
              - type: directory
                value: src/Module/Podcasts/Infrastructure/.*

        - name: SearchDomain
          collectors:
              - type: directory
                value: src/Module/Search/Domain/.*

        - name: SearchApplication
          collectors:
              - type: directory
                value: src/Module/Search/Application/.*

        - name: SearchInfrastructure
          collectors:
              - type: directory
                value: src/Module/Search/Infrastructure/.*

        - name: SeriesDomain
          collectors:
              - type: directory
                value: src/Module/Series/Domain/.*

        - name: SeriesApplication
          collectors:
              - type: directory
                value: src/Module/Series/Application/.*

        - name: SeriesInfrastructure
          collectors:
              - type: directory
                value: src/Module/Series/Infrastructure/.*

        - name: TasksDomain
          collectors:
              - type: directory
                value: src/Module/Tasks/Domain/.*

        - name: TasksApplication
          collectors:
              - type: directory
                value: src/Module/Tasks/Application/.*

        - name: TasksInfrastructure
          collectors:
              - type: directory
                value: src/Module/Tasks/Infrastructure/.*

        - name: YouTubeProgressDomain
          collectors:
              - type: directory
                value: src/Module/YouTubeProgress/Domain/.*

        - name: YouTubeProgressApplication
          collectors:
              - type: directory
                value: src/Module/YouTubeProgress/Application/.*

        - name: YouTubeProgressInfrastructure
          collectors:
              - type: directory
                value: src/Module/YouTubeProgress/Infrastructure/.*

        # Shared kernel (HMAI-235): cross-cutting domain primitives and stable
        # contracts shared by more than one bounded context (e.g. the CoverUrl
        # value object in Books + Series; the TokenCipherInterface encryption port
        # used by Music/Tasks/Series Infrastructure, HMAI-234). The standard DDD
        # shared kernel — every *Domain may depend on it, and Infrastructure/Glue
        # may too. Pure code with zero outbound dependencies.
        - name: Shared
          collectors:
              - type: directory
                value: src/Shared/.*

        # Everything inside src/ that is not under src/Module/ or src/Shared/ —
        # controllers, event listeners, security, kernel, scheduled tasks, health,
        # http decorators, entities and repositories not yet migrated to modules.
        # Glue may wire any module together; that's its job.
        - name: Glue
          collectors:
              - type: bool
                must:
                    - type: directory
                      value: src/.*
                must_not:
                    - type: directory
                      value: src/Module/.*
                    - type: directory
                      value: src/Shared/.*

        # Framework code. Captured so that `*Domain → []` actually fails on a
        # stray `use Doctrine\…` or `use Symfony\…` inside the domain layer.
        - name: Vendor
          collectors:
              - type: classLike
                value: ^(Symfony|Doctrine|Psr|Monolog|GuzzleHttp|Predis|Twig|Composer|League|Google|Sentry|Redis|AMQPChannel|AMQPConnection|AMQPQueue|AMQPExchange|AMQPEnvelope|AMQPException|JsonException|Random|Throwable|DateTime|DateTimeImmutable|DateTimeInterface|DateTimeZone|DateInterval|Exception|RuntimeException|LogicException|InvalidArgumentException|DomainException|UnexpectedValueException|OutOfBoundsException|OutOfRangeException|RangeException|TypeError|ValueError|Generator|Closure|Stringable|ArrayAccess|Countable|IteratorAggregate|Iterator|Traversable|JsonSerializable|UnitEnum|BackedEnum)\\\\.*

    ruleset:
        # Domain layer: own Shared kernel only (otherwise zero outbound deps).
        # Formalizes the CLAUDE.md "Domain bez frameworka" rule — any
        # `use Doctrine\…` or cross-module import lights up here.
        ArticlesDomain:
            - Shared
        BooksDomain:
            - Shared
        DashboardDomain:
            - Shared
        GoalsDomain:
            - Shared
        InsightsDomain:
            - Shared
        MoviesDomain:
            - Shared
        MusicDomain:
            - Shared
        NotificationsDomain:
            - Shared
        PodcastsDomain:
            - Shared
        SearchDomain:
            - Shared
        SeriesDomain:
            - Shared
        TasksDomain:
            - Shared
        YouTubeProgressDomain:
            - Shared

        # Application layer: own Domain + Shared. May freely import Vendor
        # (Messenger attributes, etc.). May NOT import other modules or Infrastructure.
        ArticlesApplication:
            - ArticlesDomain
            - Shared
            - Vendor
        BooksApplication:
            - BooksDomain
            - Shared
            - Vendor
        DashboardApplication:
            - DashboardDomain
            - Shared
            - Vendor
        GoalsApplication:
            - GoalsDomain
            - Shared
            - Vendor
        InsightsApplication:
            - InsightsDomain
            - Shared
            - Vendor
        MoviesApplication:
            - MoviesDomain
            - Shared
            - Vendor
        MusicApplication:
            - MusicDomain
            - Shared
            - Vendor
        NotificationsApplication:
            - NotificationsDomain
            - Shared
            - Vendor
        PodcastsApplication:
            - PodcastsDomain
            - Shared
            - Vendor
        SearchApplication:
            - SearchDomain
            - Shared
            - Vendor
        SeriesApplication:
            - SeriesDomain
            - Shared
            - Vendor
        TasksApplication:
            - TasksDomain
            - Shared
            - Vendor
        YouTubeProgressApplication:
            - YouTubeProgressDomain
            - Shared
            - Vendor

        # Infrastructure layer: own Domain + own Application + Shared + Vendor.
        # No cross-module reach.
        ArticlesInfrastructure:
            - ArticlesDomain
            - ArticlesApplication
            - Shared
            - Vendor
        BooksInfrastructure:
            - BooksDomain
            - BooksApplication
            - Shared
            - Vendor
        DashboardInfrastructure:
            - DashboardDomain
            - DashboardApplication
            - Shared
            - Vendor
        GoalsInfrastructure:
            - GoalsDomain
            - GoalsApplication
            - Shared
            - Vendor
        InsightsInfrastructure:
            - InsightsDomain
            - InsightsApplication
            - Shared
            - Vendor
        MoviesInfrastructure:
            - MoviesDomain
            - MoviesApplication
            - Shared
            - Vendor
        MusicInfrastructure:
            - MusicDomain
            - MusicApplication
            - Shared
            - Vendor
        NotificationsInfrastructure:
            - NotificationsDomain
            - NotificationsApplication
            - Shared
            - Vendor
        PodcastsInfrastructure:
            - PodcastsDomain
            - PodcastsApplication
            - Shared
            - Vendor
        SearchInfrastructure:
            - SearchDomain
            - SearchApplication
            - Shared
            - Vendor
        SeriesInfrastructure:
            - SeriesDomain
            - SeriesApplication
            - Shared
            - Vendor
        TasksInfrastructure:
            - TasksDomain
            - TasksApplication
            - Shared
            - Vendor
        YouTubeProgressInfrastructure:
            - YouTubeProgressDomain
            - YouTubeProgressApplication
            - Shared
            - Vendor

        # Glue: controllers, listeners, kernel, security — orchestration code
        # that legitimately wires modules together at the edges.
        Glue:
            - ArticlesDomain
            - ArticlesApplication
            - ArticlesInfrastructure
            - BooksDomain
            - BooksApplication
            - BooksInfrastructure
            - DashboardDomain
            - DashboardApplication
            - DashboardInfrastructure
            - GoalsDomain
            - GoalsApplication
            - GoalsInfrastructure
            - InsightsDomain
            - InsightsApplication
            - InsightsInfrastructure
            - MoviesDomain
            - MoviesApplication
            - MoviesInfrastructure
            - MusicDomain
            - MusicApplication
            - MusicInfrastructure
            - NotificationsDomain
            - NotificationsApplication
            - NotificationsInfrastructure
            - PodcastsDomain
            - PodcastsApplication
            - PodcastsInfrastructure
            - SearchDomain
            - SearchApplication
            - SearchInfrastructure
            - SeriesDomain
            - SeriesApplication
            - SeriesInfrastructure
            - TasksDomain
            - TasksApplication
            - TasksInfrastructure
            - YouTubeProgressDomain
            - YouTubeProgressApplication
            - YouTubeProgressInfrastructure
            - Shared
            - Vendor

        # Shared kernel: pure cross-cutting domain VOs + stable contracts. Zero
        # outbound deps like the per-module Domain layers (its only token, the
        # global \InvalidArgumentException, is uncovered — not a violation).
        Shared: []

        Vendor: []

    # Architecture is now violation-free — there are NO grandfathered
    # `skip_violations`. Every pre-existing violation from when deptrac was first
    # wired up (HMAI-146) has since been resolved. New violations must be fixed;
    # re-introducing a `skip_violations` block requires explicit justification.
    # Generate a baseline (only if ever needed again) via:
    #     vendor/bin/deptrac analyse --formatter=baseline --output=deptrac.yaml
    # (then manually move the new `skip_violations` block back here).
    #
    # Resolved follow-ups:
    # - The Books/Music/YouTubeProgress Domain ports no longer return Application
    #   DTOs (HMAI-233) — the read shapes moved to per-module Domain\ReadModel\.
    # - Music/Tasks/Series Infrastructure no longer reach the glue helper
    #   App\Security\TokenCipher directly (HMAI-234) — they depend on the Shared
    #   App\Shared\Security\TokenCipherInterface port (Infrastructure → Shared),
    #   with TokenCipher wired as its implementation via DI.
    # - The YouTube adapter no longer reaches the Tasks Google-token repository
    #   (HMAI-237) — it reads the token through the Shared
    #   App\Shared\Security\GoogleTokenProviderInterface port (Infrastructure →
    #   Shared); the Tasks GoogleTokenRepositoryInterface extends it for writes.
